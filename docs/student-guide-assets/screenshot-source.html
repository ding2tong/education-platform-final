<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Guide Screenshots</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --bg: #fdfbf7;
      --surface: #ffffff;
      --text: #1e1b4b;
      --muted: #64748b;
      --line: #eef2f7;
      --purple: #efeffc;
      --orange: #fff1e6;
      --blue: #eaf5ff;
      --green: #ebf9ec;
      font-family: "Poppins", "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    .app {
      width: 1440px;
      height: 1024px;
      display: grid;
      grid-template-columns: 264px 1fr;
      background: var(--bg);
      overflow: hidden;
    }
    .sidebar {
      background: var(--surface);
      padding: 28px 20px;
      border-right: 1px solid var(--line);
      box-shadow: 2px 0 24px rgba(30, 27, 75, 0.04);
    }
    .brand {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 36px;
      color: var(--primary);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 999px;
      color: var(--muted);
      font-weight: 700;
    }
    .nav-item.active { background: var(--purple); color: var(--primary-dark); }
    .nav-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.65;
    }
    main { padding: 44px 56px; overflow: hidden; }
    .card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 16px 44px rgba(30, 27, 75, 0.07);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 800;
      background: var(--purple);
      color: var(--primary);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 42px;
      letter-spacing: 0;
      line-height: 1.16;
    }
    h2 { margin: 0; font-size: 26px; }
    p { margin: 0; color: var(--muted); line-height: 1.7; font-size: 17px; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 14px 26px;
      color: white;
      background: var(--primary);
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.25);
    }
    .button.light {
      background: white;
      color: var(--text);
      box-shadow: inset 0 0 0 2px var(--line);
    }
    .hero {
      height: 442px;
      padding: 56px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 32px;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .hero-art {
      height: 300px;
      border-radius: 48px;
      background:
        radial-gradient(circle at 30% 30%, rgba(79, 70, 229, 0.38), transparent 36%),
        radial-gradient(circle at 68% 62%, rgba(245, 158, 11, 0.30), transparent 34%),
        linear-gradient(145deg, #ffffff, #f5f3ff);
    }
    .stat-grid, .course-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      margin-top: 26px;
    }
    .stat { padding: 26px; display: flex; gap: 18px; align-items: center; }
    .accent {
      width: 9px;
      height: 70px;
      border-radius: 999px;
      background: var(--primary);
    }
    .accent.blue { background: #93c5fd; }
    .accent.orange { background: #fcd34d; }
    .toolbar {
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 28px 0 30px;
    }
    .search {
      height: 52px;
      border-radius: 999px;
      background: #f8fafc;
      color: var(--muted);
      padding: 15px 22px;
      font-weight: 700;
    }
    .chips { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .chip {
      padding: 10px 16px;
      border-radius: 999px;
      background: #f8fafc;
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
    }
    .chip.active { background: var(--primary); color: white; }
    .course-card {
      padding: 26px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-top: 10px solid var(--purple);
    }
    .course-card.orange { border-color: var(--orange); }
    .course-card.blue { border-color: var(--blue); }
    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: #eef2ff;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      width: 52%;
      height: 100%;
      border-radius: inherit;
      background: var(--primary);
    }
    .course-header {
      padding: 42px;
      background: var(--blue);
      margin-bottom: 34px;
      position: relative;
      overflow: hidden;
    }
    .lesson-list { display: grid; gap: 14px; }
    .lesson-row {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 64px 1fr 144px;
      align-items: center;
      gap: 16px;
    }
    .number {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: var(--purple);
      color: var(--primary);
      font-weight: 900;
    }
    .status {
      justify-self: end;
      border-radius: 999px;
      padding: 10px 15px;
      background: var(--green);
      color: #15803d;
      font-weight: 800;
      font-size: 14px;
    }
    .lesson-app { grid-template-columns: 310px 1fr; }
    .outline {
      background: white;
      padding: 24px;
      border-right: 1px solid var(--line);
    }
    .outline-item {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
    }
    .outline-item.active { background: var(--purple); color: var(--primary-dark); }
    .player {
      height: 620px;
      display: grid;
      place-items: center;
      padding: 46px;
      text-align: center;
    }
    .slide {
      width: 880px;
      height: 495px;
      border-radius: 28px;
      background: linear-gradient(135deg, #ffffff, #f5f7ff);
      box-shadow: inset 0 0 0 1px var(--line);
      padding: 60px;
      display: grid;
      place-items: center;
    }
    .footer-actions {
      margin-top: 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .quiz-card { max-width: 780px; margin: 0 auto; padding: 34px; }
    .quiz-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border-radius: 18px;
      border: 2px solid var(--line);
      margin-top: 14px;
      font-weight: 700;
    }
    .quiz-option.selected { border-color: var(--primary); background: #f5f3ff; }
    .letter {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--purple);
      color: var(--primary);
    }
    .result {
      max-width: 860px;
      margin: 0 auto;
      padding: 42px;
      text-align: center;
    }
    .score {
      font-size: 72px;
      font-weight: 900;
      color: var(--primary);
      margin: 8px 0;
    }
    .detail {
      text-align: left;
      margin-top: 28px;
      padding: 22px;
      border-radius: 18px;
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const screen = new URLSearchParams(location.search).get('screen') || 'home';
    const nav = (active) => `
      <aside class="sidebar">
        <div class="brand">Eduhouse 2.0</div>
        ${['首頁', '課程中心', '學習中心'].map((item) => `
          <div class="nav-item ${item === active ? 'active' : ''}">
            <span class="nav-dot"></span><span>${item}</span>
          </div>
        `).join('')}
      </aside>`;
    const shell = (active, content, cls = '') => `<div class="app ${cls}">${nav(active)}<main>${content}</main></div>`;
    const root = document.getElementById('root');
    const screens = {
      home: shell('首頁', `
        <section class="hero card">
          <div>
            <div class="pill">建祥藥局教育訓練平台</div>
            <h1 style="margin-top: 20px;">開啟您的專業成長之路</h1>
            <p>使用學生身份登入後，可以瀏覽課程、觀看投影片教材、完成測驗，並在學習中心追蹤進度。</p>
            <div style="display:flex; gap:14px; margin-top:32px;">
              <div class="button">立即開始學習</div>
              <div class="button light">了解更多</div>
            </div>
          </div>
          <div class="hero-art"></div>
        </section>
        <section class="stat-grid">
          <div class="stat card"><div class="accent"></div><div><h2>豐富課程</h2><p>依照分類快速找到需要的訓練內容。</p></div></div>
          <div class="stat card"><div class="accent blue"></div><div><h2>隨時學習</h2><p>在電腦或平板上接續自己的進度。</p></div></div>
          <div class="stat card"><div class="accent orange"></div><div><h2>測驗評估</h2><p>完成單元測驗與課程總測驗。</p></div></div>
        </section>
      `),
      courses: shell('課程中心', `
        <h1>課程中心</h1>
        <p>搜尋課程、依學習狀態與分類篩選，選擇要開始或繼續的課程。</p>
        <section class="toolbar card">
          <div class="search">搜尋感興趣的課程...</div>
          <div class="chips"><span class="chip active">全部</span><span class="chip">未開始</span><span class="chip">進行中</span><span class="chip">已完成</span></div>
        </section>
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>教育訓練</h2><span class="pill">3 門課程</span></div>
        <section class="course-grid">
          <div class="course-card card"><div><span class="pill">進行中</span><h2 style="margin-top:18px;">新人門市服務流程</h2><p>熟悉接待、詢問、交付與紀錄流程。</p></div><div><p>進度 52%</p><div class="progress-track"><div class="progress-fill"></div></div></div></div>
          <div class="course-card orange card"><div><span class="pill">未開始</span><h2 style="margin-top:18px;">常見保健品介紹</h2><p>掌握商品特色與顧客常見問題。</p></div><div class="button">開始學習</div></div>
          <div class="course-card blue card"><div><span class="pill">已完成</span><h2 style="margin-top:18px;">用藥安全基礎</h2><p>建立用藥提醒與交互作用觀念。</p></div><div class="button light">重新複習</div></div>
        </section>
      `),
      detail: shell('課程中心', `
        <div class="course-header card">
          <span class="pill">教育訓練</span>
          <h1 style="margin-top:18px;">新人門市服務流程</h1>
          <p>完成本課程後，您將能掌握門市接待、需求確認、商品說明與後續追蹤的基本流程。</p>
          <div style="display:flex; gap:12px; margin-top:24px;"><span class="chip active">4 個單元</span><span class="chip">包含結業測驗</span></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;"><h2>課程單元目錄</h2><span class="pill">整體進度 50%</span></div>
        <div class="lesson-list">
          <div class="lesson-row card"><div class="number">01</div><div><h2>接待與需求確認</h2><p>學習如何用開放式問題了解顧客需求。</p></div><div class="status">已完成</div></div>
          <div class="lesson-row card"><div class="number">02</div><div><h2>商品說明重點</h2><p>用簡明語言說明成分、使用方式與注意事項。</p></div><div class="status">開始學習</div></div>
          <div class="lesson-row card"><div class="number">03</div><div><h2>顧客追蹤與紀錄</h2><p>了解學習後的門市紀錄與回訪重點。</p></div><div class="status">開始學習</div></div>
        </div>
      `),
      lesson: `<div class="app lesson-app">
        <aside class="outline">
          <div class="brand">新人門市服務流程</div>
          <div class="progress-track"><div class="progress-fill" style="width:50%"></div></div>
          <p style="margin:10px 0 22px;">50% 課程進度</p>
          <div class="outline-item"><div class="number">01</div><span>接待與需求確認</span></div>
          <div class="outline-item active"><div class="number">02</div><span>商品說明重點</span></div>
          <div class="outline-item"><div class="number">03</div><span>顧客追蹤與紀錄</span></div>
        </aside>
        <main>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;"><div><p>新人門市服務流程 /</p><h1>商品說明重點</h1></div><span class="pill">學習中</span></div>
          <section class="player card">
            <div class="slide"><div><span class="pill">Slide 2</span><h1 style="margin-top:20px;">用顧客聽得懂的語言說明</h1><p>先確認需求，再說明重點、用法、注意事項與何時需要諮詢藥師。</p></div></div>
          </section>
          <div class="footer-actions"><div style="display:flex; gap:12px;"><div class="button light">上一單元</div><div class="button light">下一單元</div></div><div style="display:flex; gap:12px;"><div class="button light">單元小測驗</div><div class="button">標記為完成</div></div></div>
        </main>
      </div>`,
      quiz: shell('學習中心', `
        <div class="quiz-card card">
          <div style="text-align:center; margin-bottom:28px;"><h1>商品說明小測驗</h1><div class="progress-track"><div class="progress-fill" style="width:33%"></div></div><p style="margin-top:8px;">問題 1 / 3</p></div>
          <h2>向顧客介紹保健品時，第一步最適合做什麼？</h2>
          <div class="quiz-option selected"><span class="letter">A</span><span>先了解顧客需求與目前狀況</span></div>
          <div class="quiz-option"><span class="letter">B</span><span>直接推薦價格最高的商品</span></div>
          <div class="quiz-option"><span class="letter">C</span><span>只說明商品包裝上的標語</span></div>
          <div style="text-align:right; margin-top:28px;"><span class="button">確認答案</span></div>
        </div>
      `),
      result: shell('學習中心', `
        <section class="result card">
          <span class="pill">測驗完成</span>
          <h1 style="margin-top:18px;">測驗結果</h1>
          <div class="score">86 分</div>
          <p>表現良好！建議回到課程單元複習還不熟悉的題目說明。</p>
          <div class="detail"><h2>詳細結果</h2><p><strong>問題 1：</strong>向顧客介紹保健品時，第一步最適合做什麼？</p><p><strong>您的答案：</strong>先了解顧客需求與目前狀況</p><p><strong>正確答案：</strong>先了解顧客需求與目前狀況</p></div>
          <div style="display:flex; gap:12px; justify-content:center; margin-top:28px;"><div class="button">返回單元列表</div><div class="button light">返回學習進度</div></div>
        </section>
      `)
    };
    root.innerHTML = screens[screen] || screens.home;
  </script>
</body>
</html>
